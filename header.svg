<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117">
        <animate attributeName="stop-color" values="#0D1117;#161B22;#0D1117" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#161B22">
        <animate attributeName="stop-color" values="#161B22;#1F2937;#161B22" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0D1117">
        <animate attributeName="stop-color" values="#0D1117;#161B22;#0D1117" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF">
        <animate attributeName="stop-color" values="#58A6FF;#79C0FF;#58A6FF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#79C0FF"/>
      <stop offset="100%" style="stop-color:#3FB950">
        <animate attributeName="stop-color" values="#3FB950;#56D364;#3FB950" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3FB950;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes orbit {
      from { transform: rotate(0deg) translateX(120px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(120px) rotate(-360deg); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: -3s; }
    .pulsing { animation: pulse 3s ease-in-out infinite; }
    .title-text {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 48px;
      font-weight: 700;
      fill: url(#textGrad);
      filter: url(#glow);
    }
    .subtitle-text {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 18px;
      fill: #8B949E;
      letter-spacing: 4px;
    }
    .role-text {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 22px;
      fill: #C9D1D9;
    }
    .icon-text {
      font-size: 24px;
    }
    .accent { fill: #58A6FF; }
    .accent2 { fill: #3FB950; }
    .accent3 { fill: #F78166; }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="0"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58A6FF" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="400" fill="url(#grid)"/>
  </g>

  <!-- Floating geometric elements -->
  <g class="pulsing">
    <circle cx="100" cy="80" r="3" fill="#58A6FF" opacity="0.5"/>
    <circle cx="1100" cy="320" r="2" fill="#3FB950" opacity="0.4"/>
    <circle cx="200" cy="350" r="2" fill="#F78166" opacity="0.3"/>
    <circle cx="1050" cy="70" r="3" fill="#79C0FF" opacity="0.4"/>
    <circle cx="950" cy="100" r="1.5" fill="#56D364" opacity="0.5"/>
    <circle cx="150" cy="200" r="2" fill="#58A6FF" opacity="0.3"/>
  </g>

  <!-- Decorative hexagons -->
  <g class="floating" opacity="0.08">
    <polygon points="80,60 95,50 110,60 110,80 95,90 80,80" fill="none" stroke="#58A6FF" stroke-width="1"/>
    <polygon points="1060,280 1075,270 1090,280 1090,300 1075,310 1060,300" fill="none" stroke="#3FB950" stroke-width="1"/>
  </g>
  
  <g class="floating-delay" opacity="0.06">
    <polygon points="1100,80 1115,70 1130,80 1130,100 1115,110 1100,100" fill="none" stroke="#F78166" stroke-width="1"/>
    <polygon points="60,300 75,290 90,300 90,320 75,330 60,320" fill="none" stroke="#79C0FF" stroke-width="1"/>
  </g>

  <!-- Connecting lines -->
  <g opacity="0.06">
    <line x1="0" y1="130" x2="300" y2="130" stroke="url(#lineGrad)" stroke-width="0.5"/>
    <line x1="900" y1="270" x2="1200" y2="270" stroke="url(#lineGrad)" stroke-width="0.5"/>
  </g>

  <!-- Globe icon -->
  <g transform="translate(520, 80)" class="floating" opacity="0.15">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#58A6FF" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="12" ry="25" fill="none" stroke="#58A6FF" stroke-width="0.5"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#58A6FF" stroke-width="0.5"/>
    <ellipse cx="0" cy="-10" rx="22" ry="8" fill="none" stroke="#58A6FF" stroke-width="0.3"/>
    <ellipse cx="0" cy="10" rx="22" ry="8" fill="none" stroke="#58A6FF" stroke-width="0.3"/>
  </g>

  <!-- Main Title -->
  <g class="floating">
    <text x="600" y="185" text-anchor="middle" class="title-text">
      Khaled Mohamed Balla
    </text>
  </g>

  <!-- Decorative line under title -->
  <line x1="380" y1="210" x2="820" y2="210" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.6">
    <animate attributeName="x1" values="450;380;450" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="750;820;750" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="600" y="245" text-anchor="middle" class="subtitle-text">
    INTERNATIONAL FINANCE &amp; GLOBAL TRADE
  </text>

  <!-- Role tags -->
  <g transform="translate(600, 290)">
    <!-- Tag 1 -->
    <g transform="translate(-280, 0)">
      <rect x="-10" y="-18" width="150" height="30" rx="15" fill="#58A6FF" opacity="0.12"/>
      <text x="65" y="2" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#58A6FF" font-weight="600">🎓 PhD Candidate</text>
    </g>
    <!-- Tag 2 -->
    <g transform="translate(-80, 0)">
      <rect x="-10" y="-18" width="150" height="30" rx="15" fill="#3FB950" opacity="0.12"/>
      <text x="65" y="2" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#3FB950" font-weight="600">💼 Entrepreneur</text>
    </g>
    <!-- Tag 3 -->
    <g transform="translate(120, 0)">
      <rect x="-10" y="-18" width="170" height="30" rx="15" fill="#F78166" opacity="0.12"/>
      <text x="75" y="2" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#F78166" font-weight="600">🌍 Trade Strategist</text>
    </g>
  </g>

  <!-- Location flags -->
  <text x="600" y="340" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" fill="#8B949E">
    🇲🇷 Mauritania  ·  🇹🇷 Turkey  ·  🌍 Global
  </text>

  <!-- Bottom wave -->
  <path d="M0,380 Q300,350 600,380 T1200,370 L1200,400 L0,400 Z" fill="#58A6FF" opacity="0.03"/>
  <path d="M0,390 Q300,370 600,390 T1200,385 L1200,400 L0,400 Z" fill="#3FB950" opacity="0.03"/>
</svg>
