[pytest]
# ─────────────────────────────────────────────────────────────────────
# pytest Configuration File - إعدادات Pytest
# ─────────────────────────────────────────────────────────────────────

# مسارات الاختبارات
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers المخصصة
markers =
    unit: اختبارات الوحدة (سريعة جداً)
    integration: اختبارات التكامل (متوسطة السرعة)
    e2e: اختبارات النهاية للنهاية (بطيئة)
    auth: اختبارات المصادقة والتفويض
    academic: اختبارات الوحدة الأكاديمية
    accounting: اختبارات الوحدة المحاسبية
    slow: اختبارات بطيئة
    db: اختبارات القاعدة البيانات
    smoke: اختبارات الدخان (الأساسية)

# الخيارات العامة
addopts = 
    --verbose
    -v
    --tb=short
    --strict-markers
    --color=yes
    --doctest-modules

# خيارات السجل
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format=%Y-%m-%d %H:%M:%S

log_file = tests/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format=%Y-%m-%d %H:%M:%S

# Timeout (اختياري: يحتاج pytest-timeout)
# timeout = 300

# مينيمم الإصدار
minversion = 7.0

# استخدام asyncio (اختياري)
# asyncio_mode = auto

# تقرير الملخص
console_output_style = progress
